name: release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web UI
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          mkdir -p dist/zucchini-connector
          cp -r app requirements.txt run.sh run.ps1 compose.yaml Dockerfile docker README.md \
                dist/zucchini-connector/
          find dist/zucchini-connector -name __pycache__ -type d -exec rm -rf {} +
          cd dist
          zip -qr zucchini-connector.zip zucchini-connector

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-${{ github.run_number }}
          name: zucchini-connector build ${{ github.run_number }}
          body: |
            Automated build of `${{ github.sha }}`.

            Unzip, then either `./run.sh` (Linux/macOS), `.\run.ps1` (Windows),
            or `docker compose up --build`. See README for details.
          files: dist/zucchini-connector.zip
