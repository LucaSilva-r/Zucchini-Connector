services:
  connector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CONNECTOR_HTTPS_PORT:-8443}:8090"
    # Run as the host user so files written into ./storage stay editable
    # outside the container. Export UID/GID (id -u / id -g) to override.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      CONNECTOR_API_TOKEN: "${CONNECTOR_API_TOKEN:-}"
      CONNECTOR_AT3_BITRATE_KBPS: "${CONNECTOR_AT3_BITRATE_KBPS:-256}"
      CONNECTOR_CONVERSION_WORKERS: "${CONNECTOR_CONVERSION_WORKERS:-4}"
      # THE GAME REQUIRES TLS!! SET TO 0 ONLY IF YOU ARE USING A REVERSE PROXY WITH TLS TERMINATION.
      CONNECTOR_TLS_ENABLED: "1"
      CONNECTOR_TLS_CN: "${CONNECTOR_TLS_CN:-connector.local}"
      WINEPREFIX: /tmp/wineprefix
      WINEDEBUG: -all
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
